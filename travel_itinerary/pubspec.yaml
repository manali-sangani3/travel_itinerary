name: travel_itinerary
description: "Travel Itinerary - Plan, Track, Journal"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.7

  # Network
  dio: ^5.4.3+1
  socket_io_client: ^2.0.3+1

  # Local DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # DI
  get_it: ^8.0.2

  # Functional
  dartz: ^0.10.1

  # File / Image
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  path_provider: ^2.1.4

  # Charts
  fl_chart: ^0.69.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  connectivity_plus: ^6.0.5
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  timeago: ^3.7.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/login_bg.jpg
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
